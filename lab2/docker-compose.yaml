name: lab2

services:
  postgres_service:
    image: postgres:alpine
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend-service:
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file:
      - .env
    depends_on:
      postgres_service:
        condition: service_healthy
    ports:
      - "8000:8000"
    command: sh -c "python manage.py migrate && uvicorn lab1.asgi:application --host 0.0.0.0 --port 8000"
    volumes:
      - static_volume:/app/staticfiles

  nginx_service:
    build:
      context: ./nginx
      dockerfile: Dockerfile
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - backend-service
    volumes:
      - static_volume:/staticfiles
      - ./nginx/templates:/etc/nginx/tempates:ro

volumes:
  postgres_data:
  static_volume:

secrets:
  server_key:
      file: ./certs/server.key
  server_cert:
    file:/